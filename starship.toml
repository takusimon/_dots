# Starship + Matugen template
# ~/.config/starship.toml

add_newline = false

format = """
$cmd_duration $directory$git_branch$nix_shell
  $character"""

[fill]
symbol = '-'
style = 'fg:#a08d86'

[character]
success_symbol = "[о©ұ пҒӢ](bold fg:#53433e)"
error_symbol = "[пҖҚ пҒӢ](bold fg:#ffb4ab)"

[package]
disabled = true

[git_branch]
symbol = "у°ҳ¬"
truncation_length = 12
truncation_symbol = ""
format = " у°ңҘ [оӮ¶](bold fg:#5d4035)[$symbol $branch(:$remote_branch)](fg:#ffdbce bg:#5d4035)[оӮҙ ](bold fg:#5d4035)"

[git_commit]
commit_hash_length = 4
tag_symbol = "п’¶ "

[git_state]
format = '[\($state( $progress_current of $progress_total)\)]($style) '
cherry_pick = "[рҹҚ’ PICKING](bold #ffb4ab)"

[git_status]
conflicted = " рҹҸі "
ahead = " рҹҸҺрҹ’Ё "
behind = " рҹҳ° "
diverged = " рҹҳө "
untracked = " рҹӨ· вҖҚ"
stashed = " рҹ“Ұ "
modified = " рҹ“қ "
staged = '[++\($count\)](#ffb599)'
renamed = " вңҚпёҸ "
deleted = " рҹ—‘ "

[nix_shell]
disabled = false
symbol = "уұ„…"
impure_msg = "impure"
pure_msg = "pure"
unknown_msg = "shell"
format = ' [оӮ¶](bold fg:#50471a)[$symbol $state( \($name\))](bold bg:#50471a fg:#f1e3a8)[оӮҙ](bold fg:#50471a)'

[hostname]
ssh_only = false
format = "[вҖў$hostname](bg:#5d4035 bold fg:#ffdbce)[оӮҙ](bold fg:#5d4035)"
trim_at = ".companyname.com"
disabled = false

[line_break]
disabled = false

[memory_usage]
disabled = true
threshold = -1
symbol = " "
style = "bold dimmed #ffb599"

[time]
disabled = true
format = 'рҹ•ҷ[\[ $time \]]($style) '
time_format = "%T"

[username]
style_user = "bold bg:#5d4035 fg:#ffdbce"
style_root = "bold #ffb4ab"
format = "[оӮ¶](bold fg:#5d4035)[$user]($style)"
disabled = false
show_always = true

[directory]
home_symbol = "п‘ӯ "
read_only = " п‘– "
style = "bg:#322824 fg:#f1dfd9"
truncation_length = 2
truncation_symbol = ".../"
format = '[оӮ¶](bold fg:#322824)[у°үӢ вҶ’ $path]($style)[оӮҙ](bold fg:#322824)'

[directory.substitutions]
"Desktop" = " п’© "
"Documents" = " п’Ҙ "
"Downloads" = " пҗү "
"Music" = " у°ҺҲ "
"Pictures" = " пҗҸ "
"Videos" = " п”¬ "
"GitHub" = " у°ҠӨ "

[cmd_duration]
min_time = 0
format = '[оӮ¶](bold fg:#71361d)[у°Әў $duration](bold bg:#71361d fg:#ffdbce)[оӮҙ](bold fg:#71361d)'