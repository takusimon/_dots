$bg        = rgba(50,48,47,0.92)
$bg_alt    = rgba(60,56,54,0.85)

$fg        = rgba(235,219,178,1.0)
$gray      = rgba(146,131,116,1.0)

$red       = rgba(251,73,52,1.0)
$green     = rgba(184,187,38,1.0)
$yellow    = rgba(250,189,47,1.0)
$blue      = rgba(131,165,152,1.0)
$purple    = rgba(211,134,155,1.0)
$aqua      = rgba(142,192,124,1.0)
$orange    = rgba(254,128,25,1.0)

background {
    monitor =
    path = /home/taku/Pictures/wallpaper/gruvbx-dark-gentoo.png

    blur_size = 3
    blur_passes = 2

    noise = 0.01
    contrast = 0.95
    brightness = 0.75

    vibrancy = 0.08
    vibrancy_darkness = 0.0

    color = $bg
}



label {
    monitor =
    text = cmd[update:1000] date +"%H:%M"

    color = $fg

    font_size = 92
    font_family = JetBrains Mono Nerd Font

    position = 0,0

    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:1000] echo -e "$(date +"%A, %B %d")"

    color = $gray

    font_size = 20
    font_family = JetBrains Mono Nerd Font

    position = 0,-70
	halign = center
    valign = center
}

input-field {
    monitor =

    size = 220, 44

    outline_thickness = 1

    dots_size = 0.25
    dots_spacing = 0.18
    dots_center = true

    outer_color = $gray
    inner_color = $bg_alt

    font_color = $fg

    rounding = 2

    fade_on_empty = true
    fade_timeout = 1000

    placeholder_text =
    hide_input = false

    check_color = $green
    fail_color = $red

    fail_text = ACCESS DENIED

    fail_transition = 200

    capslock_color = $orange

    position = 0, -35%

    halign = center
    valign = center
}

label {
    monitor =
    text = $LAYOUT

    color = $blue

    font_size = 13
    font_family = JetBrains Mono Nerd Font

    position = 0, -40%

    halign = center
    valign = center
}
